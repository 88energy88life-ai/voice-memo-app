<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>音声入力メモ (長時間対応版)</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f5f7; color: #333; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; margin: 0; }
    h1 { font-size: 20px; margin-bottom: 30px; }
    #recordBtn { background-color: #4CAF50; color: white; border: none; border-radius: 50px; padding: 15px 30px; font-size: 18px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; width: 100%; max-width: 300px; transition: background-color 0.3s; }
    #recordBtn.recording { background-color: #ff4444; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    #status { margin-top: 20px; font-size: 14px; color: #666; height: 20px; text-align: center; }
    #result { width: 100%; max-width: 400px; height: 150px; margin-top: 20px; padding: 15px; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; line-height: 1.5; resize: none; box-sizing: border-box; }
    
    .action-buttons { display: flex; gap: 10px; width: 100%; max-width: 400px; margin-top: 15px; }
    #copyBtn { background-color: #007AFF; color: white; border: none; border-radius: 8px; padding: 12px; font-size: 15px; font-weight: bold; cursor: pointer; flex: 1; display: none; }
    #clearBtn { background-color: #e0e0e0; color: #555; border: none; border-radius: 8px; padding: 12px; font-size: 15px; font-weight: bold; cursor: pointer; width: 80px; display: none; }

    #dictionarySection { width: 100%; max-width: 400px; margin-top: 20px; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); box-sizing: border-box; }
    #dictionarySection summary { font-weight: bold; cursor: pointer; outline: none; font-size: 15px; }
    .dic-inputs { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
    .dic-inputs input { padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    #addDicBtn { background-color: #333; color: white; border: none; border-radius: 6px; padding: 10px; font-weight: bold; cursor: pointer; }
    #dicStatus { font-size: 12px; color: #4CAF50; margin-top: 8px; text-align: center; height: 15px; }

    #historyContainer { width: 100%; max-width: 400px; margin-top: 30px; display: flex; flex-direction: column; gap: 15px; }
    .history-title { font-size: 14px; color: #888; border-bottom: 1px solid #ddd; padding-bottom: 8px; font-weight: bold; }
    .history-item { background-color: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-size: 15px; line-height: 1.5; }
    .history-time { font-size: 12px; color: #aaa; margin-bottom: 8px; }
    .history-actions { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
    .history-btn { border: none; border-radius: 6px; padding: 6px 12px; font-size: 13px; font-weight: bold; cursor: pointer; }
    .history-btn.copy { background-color: #f0f8ff; color: #007AFF; }
    .history-btn.delete { background-color: #fff0f0; color: #ff4444; }
  </style>
</head>
<body>

  <h1>音声入力メモ (長時間対応)</h1>
  <button id="recordBtn">🎤 録音を開始</button>
  <div id="status">待機中...</div>
  
  <textarea id="result" placeholder="ここに最新のテキストが表示されます..."></textarea>
  
  <div class="action-buttons">
    <button id="copyBtn">📋 コピーする</button>
    <button id="clearBtn">🗑️ クリア</button>
  </div>

  <details id="dictionarySection">
    <summary>⚙️ 辞書登録（読み方と変換ルール）</summary>
    <div class="dic-inputs">
      <input type="text" id="dicYomi" placeholder="読み仮名 (例: たいぷれす)">
      <input type="text" id="dicText" placeholder="変換後 (例: Typeless)">
      <button id="addDicBtn">辞書に追加する</button>
      <div id="dicStatus"></div>
    </div>
  </details>

  <div id="historyContainer">
    <div class="history-title">📝 履歴 (5分ごとに自動追加)</div>
    <div id="historyList"></div>
  </div>

  <script>
    // ★★★ ここにGASのURLを貼り付けます ★★★
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzqOmyy1HaUmPM0RUmsBNsMrIOn4sCudFzSC4nPl9IpjS7IlXtXWNt2I2UHb4sfmKSHLg/exec';

    // 🌟 設定：何分ごとに区切って送信するか（5分 = 300000ミリ秒）
    const CHUNK_INTERVAL = 300000; 

    let mediaRecorder; 
    let audioChunks = []; 
    let isRecording = false;
    let wakeLock = null;
    let chunkTimer = null;

    const recordBtn = document.getElementById('recordBtn'); 
    const statusText = document.getElementById('status');
    const resultArea = document.getElementById('result'); 
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn'); 
    const historyList = document.getElementById('historyList');
    
    const dicYomi = document.getElementById('dicYomi'); 
    const dicText = document.getElementById('dicText');
    const addDicBtn = document.getElementById('addDicBtn'); 
    const dicStatus = document.getElementById('dicStatus');

    // スリープ防止
    async function requestWakeLock() {
      try { if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); } } catch (err) {}
    }
    function releaseWakeLock() { if (wakeLock !== null) { wakeLock.release().then(() => { wakeLock = null; }); } }

    // 辞書登録
    addDicBtn.addEventListener('click', async () => {
      const yomi = dicYomi.value.trim(); const text = dicText.value.trim();
      if (!yomi || !text) return;
      dicStatus.textContent = '登録中...';
      try {
        const response = await fetch(GAS_URL, { method: 'POST', redirect: 'follow', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: 'addDictionary', yomi: yomi, text: text }) });
        const data = await response.json();
        if (data.success) { dicStatus.textContent = '✅ 登録完了'; dicYomi.value = ''; dicText.value = ''; }
      } catch (err) { dicStatus.textContent = '通信エラー'; }
    });

    // 録音ボタン
    recordBtn.addEventListener('click', async () => { !isRecording ? startRecording() : stopRecording(); });
    
    // コピー・クリア
    copyBtn.addEventListener('click', () => { if (resultArea.value) { navigator.clipboard.writeText(resultArea.value).then(() => { copyBtn.textContent = '✓ コピー完了'; setTimeout(() => { copyBtn.textContent = '📋 コピーする'; }, 2000); }); } });
    clearBtn.addEventListener('click', () => { resultArea.value = ''; copyBtn.style.display = 'none'; clearBtn.style.display = 'none'; });

    function addHistory(text) {
      const item = document.createElement('div'); item.className = 'history-item';
      const time = document.createElement('div'); const now = new Date();
      time.className = 'history-time'; time.textContent = now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');
      const content = document.createElement('div'); content.textContent = text;
      const actions = document.createElement('div'); actions.className = 'history-actions';
      const copyHBtn = document.createElement('button'); copyHBtn.className = 'history-btn copy'; copyHBtn.innerHTML = '📋 コピー';
      copyHBtn.onclick = () => { navigator.clipboard.writeText(text).then(() => { copyHBtn.innerHTML = '✓'; setTimeout(() => { copyHBtn.innerHTML = '📋 コピー'; }, 2000); }); };
      const deleteHBtn = document.createElement('button'); deleteHBtn.className = 'history-btn delete'; deleteHBtn.innerHTML = '🗑️';
      deleteHBtn.onclick = () => item.remove();
      actions.appendChild(copyHBtn); actions.appendChild(deleteHBtn);
      item.appendChild(time); item.appendChild(content); item.appendChild(actions);
      historyList.insertBefore(item, historyList.firstChild);
    }

    // 録音開始
    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        isRecording = true;
        recordBtn.textContent = '⏹ 録音を終了する';
        recordBtn.classList.add('recording');
        statusText.textContent = '録音中... (5分ごとに自動送信)';
        
        await requestWakeLock();
        startChunk(stream);
      } catch (err) { alert('マイクの使用が許可されていません。'); }
    }

    // 🌟 5分ごとの録音サイクルを作る
    function startChunk(stream) {
      if (!isRecording) return;

      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
      
      mediaRecorder.onstop = () => {
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        sendToGAS(audioBlob); // 音声を送信
        
        // 🌟 まだ録音モードなら、すぐに次のチャンクを開始
        if (isRecording) {
          startChunk(stream);
        }
      };

      mediaRecorder.start();

      // 🌟 5分後に自動で止める（onstopが呼ばれて次の録音が始まる）
      chunkTimer = setTimeout(() => {
        if (isRecording && mediaRecorder.state === "recording") {
          mediaRecorder.stop();
        }
      }, CHUNK_INTERVAL);
    }

    // 録音終了（ユーザーがボタンを押したとき）
    function stopRecording() {
      isRecording = false;
      clearTimeout(chunkTimer); // タイマーを解除
      
      if (mediaRecorder && mediaRecorder.state === "recording") {
        mediaRecorder.stop(); // 最後のチャンクを送信させる
      }
      
      recordBtn.textContent = '🎤 録音を開始';
      recordBtn.classList.remove('recording');
      statusText.textContent = '最後のデータを処理中...';
      
      mediaRecorder.stream.getTracks().forEach(track => track.stop());
      releaseWakeLock();
    }

    // GASにデータを飛ばす
    function sendToGAS(blob) {
      const reader = new FileReader();
      reader.readAsDataURL(blob);
      reader.onloadend = async () => {
        const base64data = reader.result.split(',')[1];
        try {
          const response = await fetch(GAS_URL, { 
            method: 'POST', redirect: 'follow', 
            headers: { 'Content-Type': 'text/plain' }, 
            body: JSON.stringify({ audioBase64: base64data, mimeType: 'audio/webm' }) 
          });
          const data = await response.json();
          if (data.success) {
            resultArea.value = data.text;
            addHistory(data.text);
            copyBtn.style.display = 'block'; clearBtn.style.display = 'block';
            statusText.textContent = '一部を処理しました。録音継続中...';
          }
        } catch (err) { statusText.textContent = '通信エラー（一部送信失敗）'; }
      };
    }
  </script>
</body>
</html>
