<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>音声メモ (1時間対応・安定版)</title>
  <style>
    body { font-family: -apple-system, sans-serif; background-color: #f4f5f7; color: #333; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; margin: 0; }
    #recordBtn { background-color: #4CAF50; color: white; border: none; border-radius: 50px; padding: 18px 40px; font-size: 20px; font-weight: bold; cursor: pointer; width: 100%; max-width: 300px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    #recordBtn.recording { background-color: #ff4444; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    #status { margin-top: 20px; font-size: 14px; color: #666; text-align: center; font-weight: bold; }
    #result { width: 100%; max-width: 400px; height: 150px; margin-top: 20px; padding: 15px; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; resize: none; box-sizing: border-box; }
    .action-buttons { display: flex; gap: 10px; width: 100%; max-width: 400px; margin-top: 15px; }
    #copyBtn, #clearBtn { border: none; border-radius: 8px; padding: 12px; font-weight: bold; cursor: pointer; flex: 1; display: none; }
    #copyBtn { background-color: #007AFF; color: white; }
    #clearBtn { background-color: #e0e0e0; color: #555; max-width: 80px; }
    #historyContainer { width: 100%; max-width: 400px; margin-top: 30px; }
    .history-item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-size: 15px; }
    .history-time { font-size: 12px; color: #aaa; margin-bottom: 5px; }
  </style>
</head>
<body>
  <h1>音声入力 (安定版)</h1>
  <button id="recordBtn">🎤 録音を開始</button>
  <div id="status">待機中</div>
  <textarea id="result" placeholder="結果がここに表示されます..."></textarea>
  <div class="action-buttons">
    <button id="copyBtn">📋 コピー</button>
    <button id="clearBtn">🗑️</button>
  </div>
  <div id="historyContainer"><div id="historyList"></div></div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzqOmyy1HaUmPM0RUmsBNsMrIOn4sCudFzSC4nPl9IpjS7IlXtXWNt2I2UHb4sfmKSHLg/exec';
    const CHUNK_MS = 300000; // 5分

    let mediaRecorder; let audioChunks = []; let isRecording = false;
    let wakeLock = null; let chunkTimer = null;

    const recordBtn = document.getElementById('recordBtn');
    const statusText = document.getElementById('status');
    const resultArea = document.getElementById('result');
    const historyList = document.getElementById('historyList');

    recordBtn.onclick = () => { !isRecording ? start() : stop(); };

    async function start() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        isRecording = true;
        recordBtn.textContent = '⏹ 録音を停止';
        recordBtn.classList.add('recording');
        if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
        
        runChunk(stream);
      } catch (e) { alert('マイクを許可してください'); }
    }

    function runChunk(stream) {
      if (!isRecording) return;
      
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      
      mediaRecorder.onstop = async () => {
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        send(blob);
        if (isRecording) {
          setTimeout(() => runChunk(stream), 500); // 0.5秒待って再開
        }
      };

      mediaRecorder.start();
      statusText.textContent = '録音中... (5分後に自動保存)';
      
      chunkTimer = setTimeout(() => {
        if (isRecording && mediaRecorder.state === 'recording') mediaRecorder.stop();
      }, CHUNK_MS);
    }

    function stop() {
      isRecording = false;
      clearTimeout(chunkTimer);
      if (mediaRecorder.state === 'recording') mediaRecorder.stop();
      recordBtn.textContent = '🎤 録音を開始';
      recordBtn.classList.remove('recording');
      statusText.textContent = '最終処理中...';
      if (wakeLock) { wakeLock.release(); wakeLock = null; }
      mediaRecorder.stream.getTracks().forEach(t => t.stop());
    }

    async function send(blob) {
      const reader = new FileReader();
      reader.readAsDataURL(blob);
      reader.onloadend = async () => {
        const base64 = reader.result.split(',')[1];
        try {
          const res = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ audioBase64: base64 })
          });
          const data = await res.json();
          if (data.success) {
            resultArea.value = data.text;
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `<div class="history-time">${new Date().toLocaleTimeString()}</div>${data.text}`;
            historyList.prepend(item);
            document.getElementById('copyBtn').style.display = 'block';
            document.getElementById('clearBtn').style.display = 'block';
          }
        } catch (e) { statusText.textContent = '送信エラー。録音は継続中'; }
      };
    }
  </script>
</body>
</html>
